<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Health | Secure Bio-Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #e0e7ff, #f8fafc);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        .auth-container {
            width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
            z-index: 10;
        }

        .auth-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
            color: #64748b;
        }

        .tab.active {
            background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(45, 212, 191, 0.4);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-box input {
            width: 100%;
            padding: 12px 15px;
            background: white;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            color: #1e293b;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #2dd4bf;
            background: white;
            outline: none;
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.2);
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .bg-blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #2dd4bf;
            filter: blur(150px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
        }

        .blob-1 {
            top: -100px;
            right: -100px;
        }

        .blob-2 {
            bottom: -100px;
            left: -100px;
            background: #38bdf8;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2dd4bf 0%, #38bdf8 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .btn-google {
            background: white;
            color: #475569;
            border: 1px solid rgba(0, 0, 0, 0.1);
            padding: 12px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin-top: 15px;
            text-decoration: none;
        }

        .btn-google:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }
    </style>
</head>
